name: deploying war in tomcat
on: 
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: self-hosted 

    steps:
      - name: checkout to git repo
        uses: actions/checkout@v4

      - name: build .war in mvn
        run: mvn clean package -DskipTests
        

      - name: deploy in tomcat
        run: |
              WAR_FILE=$(ls target/*.war | head -n 1)
              APP_NAME=kalyan
              curl -u "${{ secrets.TOMCAT_USERNAME }}:${{ secrets.TOMCAT_PASSWORD }}" \
                --upload-file "$WAR_FILE" \
                "http://${{ secrets.TOMCAT_HOST }}:8081/manager/text/deploy?path=/$APP_NAME&update=true"
