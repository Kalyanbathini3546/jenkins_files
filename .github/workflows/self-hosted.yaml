name: CI-CD Pipeline with ArgoCD

on:
  push:
    branches:
      - main
  workflow_dispatch: 
  
jobs:
  build:
    runs-on: self-hosted

    env:
      REGISTRY: docker.io
      IMAGE_NAME: kalyan3546/sh

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: install java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '17'  
          
      - name: Install Maven
        run: |
          sudo yum install maven -y


      - name: Build with Maven
        run: mvn clean package -DskipTests


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4


      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.run_number }}

      # Update Deployment Manifest
      - name: Update Deployment Manifest
        run: |
          echo "Updating image tag in deployment.yaml..."
          sed -i "s|${IMAGE_NAME}:.*|${IMAGE_NAME}:${GITHUB_RUN_NUMBER}|g" deploymentfiles/deployment.yaml

      - name: commit manifest update
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update deployment image to version ${{ github.run_number }}"
          branch: main

        
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: checkout to repo
        uses: actions/checkout@v4
        
      - name: install argo cd
        run: |
              curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-darwin-amd64
              chmod +x argocd
              sudo mv argocd /usr/local/bin/

      - name: Trigger ArgoCD Sync
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure
          argocd app sync kalyanapp

